<div class="content">
    <div class="auth-page">
        <div class="container-fluid p-0">
            <div class="row g-0">
                <div class="col-xxl-3 col-lg-4 col-md-5">
                    <div class="auth-full-page-content d-flex p-sm-5 p-4">
                        <div class="w-100">
                            <div class="d-flex flex-column h-100">
                                <div class="text-center">
                                    <a routerLink="/Login" class="d-block auth-logo">

                                    </a>
                                </div>
                                <div class="auth-content my-auto">
                                    <div class="text-center">
                                        <h5 class="mb-0">Verify your OTP</h5>

                                    </div>
                                    <div class="alert alert-success text-center my-4" role="alert">
                                        Please check your email inbox or spam folder. Reset password instruction sent to your email.
                                    </div>

                                    <form [formGroup]="verifyotp">

                                        <div class="mt-4">
                                            <div class="mb-3">
                                                <input type="text" class="form-control" formControlName="OTP" placeholder="Enter OTP">
                                                <div *ngIf="submitted && f['OTP'].errors" class="validation-invalid-label">
                                                    <div *ngIf="f['OTP'].errors['required']"><span style="color: red;">OTP is required</span></div>
                                                </div>
                                            </div>

                                            <div class="mb-3 mt-4">
                                                <button class="btn btn-primary w-100 waves-effect waves-light" (click)="onSubmit()" type="submit">Verify</button>

                                            </div>

                                        </div>

                                        <div class="mt-5 text-center">
                                            <p class="text-muted mb-0">
                                                Remember It ? <a routerLink="/Login" class="text-primary fw-semibold">Sign In </a>
                                            </p>
                                        </div>
                                    </form>
                                </div>

                            </div>
                        </div>
                    </div>
                    <!-- end auth full page content -->
                </div>
                <!-- end col -->
                <div class="col-xxl-9 col-lg-8 col-md-7" style="position: fixed; height: 100vh; right: 0; top: 0;">

                    <div class="auth-bg pt-md-5 p-4 d-flex">
                        <div class="bg-overlay bg-primary hover" style="opacity: 0.4"></div>
                        <ul class="bg-bubbles">
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                        </ul>
                        <!-- end bubble effect -->


                        <div class="row justify-content-center align-items-center">
                            <div class="col-xl-7">
                                <div class="p-0 p-sm-4 px-xl-0">
                                    <div id="reviewcarouselIndicators" class="carousel slide" data-bs-ride="carousel">

                                        <div class="carousel-indicators carousel-indicators-rounded justify-content-start ms-0 mb-0">
                                            <button type="button" data-bs-target="#reviewcarouselIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                                            <button type="button" data-bs-target="#reviewcarouselIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                                            <button type="button" data-bs-target="#reviewcarouselIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                                        </div>
                                        <!-- end carouselIndicators -->

                                        <!-- end carousel-inner -->
                                    </div>
                                    <!-- end review carousel -->
                                </div>
                            </div>
                        </div>


                    </div>
                </div>
                <!-- end col -->
            </div>
            <!-- end row -->
        </div>
        <!-- end container fluid -->
    </div>
</div>
