<div class="content">
    <div class="auth-page">
        <div class="container-fluid p-0">
            <div class="row g-0">
                <div class="col-xxl-3 col-lg-4 col-md-5">
                    <div class="auth-full-page-content d-flex p-sm-5 p-4">
                        <div class="w-100">
                            <div class="d-flex flex-column h-80">
                                <div class="mb-4 mb-md-5 text-center">
                                    <a routerLink="/Login">

                                        <img src="assets/images/InfologiaLogo2.png" alt="" height="65">
                                    </a>
                                </div>
                                <div class="auth-content my-auto">
                                    <div class="text-center">
                                        <h5 class="mb-0">Welcome Back !</h5>
                                        <p class="text-muted mt-2">Sign in on Infologia Technologies</p>
                                    </div>
                                    <form [formGroup]="loginForm" novalidate>

                                        <div class="mb-3">
                                            <label for="username">Email</label>
                                            <input type="text" class="form-control" formControlName="email" placeholder="Enter Email">
                                        </div>
                                        <div class="form-group">
                                            <div *ngIf="email?.invalid && (email?.dirty || email?.touched)">
                                                <div *ngIf="email?.errors?.['required']">
                                                    <span style="color: red;">Email is required.</span>
                                                </div>
                                                <div *ngIf="email?.errors?.['email']">
                                                    <span style="color: red;"> Please enter a valid email address.</span>
                                                </div>
                                            </div>

                                        </div>
                                        <div class="mb-3">
                                            <div class="d-flex align-items-start">
                                                <div class="flex-grow-1">
                                                    <label for="userpassword">Password</label>
                                                </div>
                                                <div class="flex-shrink-0">
                                                    <div class="">
                                                        <a routerLink="/ForgotPassword" class="text-muted">Forgot password?</a>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="input-group auth-pass-inputgroup">
                                                <input type="password" id="pswd" class="form-control" formControlName="Password" placeholder="Enter password" aria-label="Password" aria-describedby="password-addon">
                                                <button class="btn btn-light shadow-none ms-0 icon-btn" type="button" id="password-addon" (click)="togglePasswordVisibility()"><i class="mdi mdi-eye-outline"></i></button>
                                            </div>
                                        </div>
                                        <div class="row mb-4">
                                            <div class="col">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="remember-check">
                                                    <label class="form-check-label" for="remember-check">
                                                    Remember me
                                                </label>
                                                </div>
                                            </div>

                                        </div>
                                        <div class="alert alert-danger" *ngIf="errorMsg != ''">

                                            <span>
                                                <b> Error - </b> Invalid User</span>
                                        </div>
                                        <div class="mb-3">
                                            <button class="btn btn-primary w-100 waves-effect waves-light" [disabled]="!loginForm.valid" value="Login" (click)="onSubmit()" type="submit">Log In</button>
                                        </div>
                                    </form>
                                </div>
                                <div class="mt-4 mt-md-5 text-center">
                                    <p class="mb-0">©
                                        <script>
                                            document.write(new Date().getFullYear())
                                        </script>
                                     2024 Designed And Developed By Infologia Technologies Pvt Ltd</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- end auth full page content -->
                </div>
                <!-- end col -->
                <div class="col-xxl-9 col-lg-8 col-md-7">
                    <div class="auth-bg pt-md-5 p-4 d-flex">
                        <div class="bg-overlay bg-primary"></div>
                        <ul class="bg-bubbles">
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                            <li></li>
                        </ul>
                        <!-- end bubble effect -->
                        <div class="row justify-content-center align-items-center">
                            <div class="col-xl-7">
                                <div class="p-0 p-sm-4 px-xl-0">
                                    <div id="reviewcarouselIndicators" class="carousel slide" data-bs-ride="carousel">

                                        <!-- end carouselIndicators -->
                                        <div class="carousel-inner">

                                        </div>
                                        <!-- end carousel-inner -->
                                    </div>
                                    <!-- end review carousel -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- end col -->
            </div>
            <!-- end row -->
        </div>
       
    </div>
</div>
