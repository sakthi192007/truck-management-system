<div class="main-content">
    <div class="page-content">
        <div class="row">
            <div class="col-12">
                <div class="page-title-box d-sm-flex align-items-center justify-content-between">
                    <h4 class="mb-sm-0 font-size-18" runat="server">Master Location Route Details</h4>
                    <div class="page-title-right">
                        <ol class="breadcrumb m-0">
                            <li class="breadcrumb-item"><a routerLink="/Dashboard">Dashboard</a></li>
                            <li class="breadcrumb-item"><a>Master Location Route Details</a></li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body p-4">
                        <form [formGroup]="locationroutemap">

                            <h5 style="color: #232879; border-bottom: 1px solid #232879;">Master Location Information
                            </h5>
                            <div class="row">
                                <div class="col-lg-12 ms-lg-auto">
                                    <div class="mt-4 mt-lg-0">
                                        <div class="row mb-4">

                                             <div class="col-md-3">
  <label>Location Type <span style="color: red;">*</span></label>
  
  <div class="dropdown-wrapper">
    <ngx-select-dropdown
      class="form-control custom-dropdown"
      [config]="locationdropdownConfig"
      [options]="locationType"
      formControlName="Location_Type">
    </ngx-select-dropdown>
  </div>

  <div *ngIf="submitted && f['Location_Type'].errors" class="validation-invalid-label mt-1">
    <div *ngIf="f['Location_Type'].errors['required']">
      <span style="color: red;">Location Type is required</span>
    </div>
  </div>
</div>


                                        
                                            <div class="col-md-3">
                                                <label>Location Name<span style="color: red;"> *</span></label>
                                                <input type="text" class="form-control" formControlName="Location_Name"
                                                    placeholder="Enter Location Name" required>
                                                <div *ngIf="submitted && f['Location_Name'].errors"
                                                    class="validation-invalid-label">
                                                    <div *ngIf="f['Location_Name'].errors['required']"><span
                                                            style="color: red;">Location Name is required</span>
                                                    </div>
                                                </div>

                                            </div>
                                            <div class="col-md-3">
                                                <label>Latitude <span style="color: red;"> *</span></label>
                                                <input type="text" class="form-control" formControlName="latitude"
                                                    placeholder="Enter latitude" required>
                                                <div *ngIf="submitted && f['latitude'].errors"
                                                    class="validation-invalid-label">
                                                    <div *ngIf="f['latitude'].errors['required']"><span
                                                            style="color: red;">Latitude is required</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <label>Longitude<span style="color: red;"> *</span></label>
                                                <input type="text" class="form-control" formControlName="longitude"
                                                    placeholder="Enter longitude" required>
                                                <div *ngIf="submitted && f['longitude'].errors"
                                                    class="validation-invalid-label">
                                                    <div *ngIf="f['longitude'].errors['required']"><span
                                                            style="color: red;">Longitude is required</span>
                                                    </div>
                                                </div>


                                            </div>
                                        </div>
                                        <div class="row mb-4">
                                            <div class="col-md-3">
                                                <label>Address<span style="color: red;"> *</span></label>
                                                <textarea class="form-control" rows="1" formControlName="Address"
                                                    required></textarea>
                                                <div *ngIf="submitted && f['Address'].errors"
                                                    class="validation-invalid-label">
                                                    <div *ngIf="f['Address'].errors['required']"><span
                                                            style="color: red;">Address is required</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <label>City</label>
                                                <input type="text" class="form-control" formControlName="city"
                                                    placeholder="Enter City">
                                            </div>
                                            <div class="col-md-3">
                                                <label>State / Province</label>
                                                <input type="text" class="form-control" formControlName="State"
                                                    placeholder="Enter State">
                                            </div>
                                            <div class="col-md-3">
                                                <label>Country</label>
                                                <input type="text" class="form-control" formControlName="Country"
                                                    placeholder="Enter Country ">

                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                            <br>
                            <br>

                            <h5 style="color: #232879; border-bottom: 1px solid #232879;">Search Location by Latitude
                                and Longitude</h5>

                            <div class="row">
                                <div class="col-lg-12 ms-lg-auto">
                                    <div class="mt-4 mt-lg-0">
                                        <br>
                                        <br>
                                        <div class="row mb-4">
  <div class="col-md-3">
                                                <input type="text" class="form-control" formControlName="PlaceName"
                                                    [(ngModel)]="placeName" placeholder="Enter Place Name"
                                                    id="autocomplete">

                                                <!-- <input type="text" class="form-control"  (ngModelChange)="onPlaceNameChange($event)" formControlName="PlaceName" [(ngModel)]="placeName" placeholder="Enter Place Name"> -->
                                            </div>
                                            <div class="col-md-2">
                                                <button id="btncolors" class="btn btn-primary w-md" type="button"
                                                    (click)="findLocation()">
                                                    <i class='bx bxs-navigation'></i>&nbsp;Find
                                                </button>
                                            </div>
                                            <div class="col-md-3">
                                                <input type="text" class="form-control" formControlName="Latitudes"
                                                    [value]="latitudes" readonly>
                                                   
                                            </div>
                                            <div class="col-md-3">
                                                <input type="text" class="form-control" formControlName="Longitudes"
                                                    [value]="longitudes" readonly>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-12">
                                                <div id="map" style="height: 500px;"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <br>
                            <br>
                            <div class="row justify-content-end text-end">
                                <div class="col-sm-9">
                                    <div>
                                        <a id="btncolors" routerLink="/LocationGrid" class="btn btn-primary w-md">
                                            <i class="bx bx-arrow-back" aria-hidden="true"></i>&nbsp;Back
                                        </a>&nbsp;

                                        <button id="btncolors" *ngIf="views != 0" (click)="submit()"
                                            class="btn btn-primary w-md me-2" type="button">
                                            <i class="bx bx-save"></i>&nbsp;{{ buttontext }}
                                        </button>




                                    </div>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
