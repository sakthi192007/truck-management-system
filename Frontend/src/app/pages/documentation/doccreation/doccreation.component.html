<div class="main-content">
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between">
          <div class="page-title-right">
            <ol class="breadcrumb m-0">
              <li class="breadcrumb-item"><a>LR COPY Document</a></li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card">
        <div class="card-body">
          <ul class="nav nav-tabs nav-fill" id="pills-tab">
            <li class="nav-item" style="background-color: #232879; color: white">
              <a class="nav-link active" id="pills-contact-tab" data-bs-toggle="pill" type="button"
                data-bs-target="#ExportB">LR COPY Document Details</a>
            </li>
          </ul>
          <div class="tab-content" id="pills-contact-tab">
            <div class="tab-pane fade show active" id="ExportB">
              <div class="tab-content">
                <div class="tab-pane fade show active">
                  <div class="col-lg-12">
                    <div class="card">
                      <div class="card-body p-4">
                        <form [formGroup]="lrform" (ngSubmit)="submit()">
                          <div class="row">
                            <div class="col-lg-12 ms-lg-auto">
                              <div class="mt-4 mt-lg-0">
                                <div class="row mb-4">
                                  <div class="mb-3">
                                    <label>Booking Number<span style="color: red;"> *</span></label>
                                    <select class="form-select" formControlName="BookingNo"
                                      (change)="onBookingChange($event)">
                                      <option value="">Select Booking</option>
                                      <option *ngFor="let booking of bookings" [value]="booking.BookingNumber">
                                        {{ booking.BookingNumber }}
                                      </option>
                                    </select>
                                    <div *ngIf="submitted && f['BookingNo'].errors" class="validation-invalid-label">
                                                <div *ngIf="f['BookingNo'].errors['required']">
                                                    <span style="color: red;">Booking No is required</span>
                                                </div>
                                            </div>
                                  </div>

                                  <!-- Consignment Note Number -->
                                  <div class="col-md-3">
                                    <label>Consignment Note Number
                                      </label>
                                    <input type="text" class="form-control" formControlName="Consignmentnoteno" />
                                    
                                  </div>

                                  <!-- Seal No -->
                                  <div class="col-md-3">
                                    <label>Seal No
                                      </label>
                                    <input class="form-control" formControlName="Sealno" />
                                    
                                  </div>

                                  <!-- Consignment Date -->
                                  <div class="col-md-3">
                                    <label>Consignment Date
                                     </label>
                                    <input type="datetime-local" class="form-control"
                                      formControlName="ConsignmentDate" />
                                    
                                  </div>

                                  <!-- Company Name -->
                                  <div class="col-md-3">
                                    <label>Company Name
                                      </label>
                                    <input type="text" class="form-control" formControlName="Company" />
                                    
                                  </div>
                                </div>

                                <div class="row align-items-center">
                                  <div class="col-md-3">
                                    <label>Shipment Type
                                      </label>
                                  </div>

                                  <div class="col-md-3">
                                    <div class="form-check">
                                      <input type="checkbox" class="form-check-input" value="AIR"
                                        (change)="onShipmentTypeChange($event)" />
                                      <label class="form-check-label">AIR</label>
                                    </div>
                                  </div>

                                  <div class="col-md-3">
                                    <div class="form-check">
                                      <input type="checkbox" class="form-check-input" value="FCL"
                                        (change)="onShipmentTypeChange($event)" />
                                      <label class="form-check-label">FCL</label>
                                    </div>
                                  </div>

                                  <div class="col-md-3">
                                    <div class="form-check">
                                      <input type="checkbox" class="form-check-input" value="LCL"
                                        (change)="onShipmentTypeChange($event)" />
                                      <label class="form-check-label">LCL</label>
                                    </div>
                                  </div>
                                </div>

                                <div class="row mb-4">
                                  <div class="col-md-3">
                                    <label>Policy No
                                     </label>
                                    <input type="text" class="form-control" formControlName="PoliceNo"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>Amount
                                      </label>
                                    <input type="text" class="form-control" type="number" formControlName="Amount"
                                       />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>
                                      Date</label>
                                    <input type="datetime-local" class="form-control" formControlName="Date"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>Risk</label>
                                    <input type="text" class="form-control" formControlName="Risk"  />
                                    
                                  </div>
                                </div>
                                <div class="row mb-4">
                                  <div class="col-md-3">
                                    <label>Consignor Name & Address:M/S.</label>
                                    <textarea class="form-control" formControlName="ConsignornameAdd"
                                      rows="1"></textarea>
                                   
                                  </div>

                                  <div class="col-md-3">
                                    <label>Consignee Name & Address:M/S.</label>
                                    <textarea class="form-control" formControlName="ConsigneenameAdd"
                                      rows="1"></textarea>
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>From Address</label>
                                    <textarea class="form-control" formControlName="FromAdd" rows="1"></textarea>
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>To Address</label>
                                    <textarea class="form-control" formControlName="ToAdd" rows="1"></textarea>
                                    
                                  </div>
                                </div>
                                <div class="row mb-4">
                                  <div class="col-md-3">
                                    <label>Container No
                                     </label>
                                    <input type="text" class="form-control" formControlName="Containerno"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Driver No
                                      </label>
                                    <input type="text" class="form-control" formControlName="Driverno"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>No.Of.Packages&Pallets
                                     </label>
                                    <input type="text" class="form-control" formControlName="Noofpkgspallets"
                                       />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Customer Invoice.No
                                     </label>
                                    <input type="text" class="form-control" formControlName="CustomerinvoiceNo"
                                       />
                                    
                                  </div>
                                </div>
                                <div class="row mb-4">
                                  <div class="col-md-3">
                                    <label>Customer Invoice.Date
                                     </label>
                                    <input type="datetime-local" class="form-control" formControlName="Customerinvoice"
                                       />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Nature.Of Goods</label>
                                    <input type="text" class="form-control" formControlName="Natureofgoods"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>Weight.Gross</label>
                                    <input type="text" class="form-control" formControlName="WeightGross"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Weight Chargeable</label>
                                    <input type="text" class="form-control" formControlName="WeightChargeable"
                                       />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Freight To Pay</label>
                                    <input type="text" class="form-control" formControlName="FreightToPay"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>Freight Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="FreightPaid"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>Surcharge Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="SurchargePaid"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Surcharge To Pay</label>
                                    <input type="text" class="form-control" formControlName="SurchargeToPay"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>CP.Ch Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="CpchPaid"  />
                                   
                                  </div>

                                  <div class="col-md-3">
                                    <label>CP.Ch To Pay</label>
                                    <input type="text" class="form-control" formControlName="CpchToPay"  />
                                    
                                  </div>

                                  <div class="col-md-3">
                                    <label>ST.Ch To Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="StchPaid"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>ST.Ch To Pay</label>
                                    <input type="text" class="form-control" formControlName="StchToPay"  />
                                    
                                  </div>

                                  <div class="col-md-3">
                                    <label>HAMALI.Ch Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="HAMALIchPaid"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>HAMALI.Ch To Pay</label>
                                    <input type="text" class="form-control" formControlName="HAMALIchToPay"  />
                                   
                                  </div>

                                  <div class="col-md-3">
                                    <label>Risk.Rs Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="RiskrsPaid"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Risk.Rs To Pay</label>
                                    <input type="text" class="form-control" formControlName="RiskrsToPay"  />
                                    
                                  </div>

                                  <div class="col-md-3">
                                    <label>Service.Ch Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="ServicechPaid"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Service.Ch To Pay</label>
                                    <input type="text" class="form-control" formControlName="ServicechToPay"  />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>G.Total Due & Paid</label>
                                    <input type="text" class="form-control" formControlName="GrandTotalPaid"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>G.Total To Pay</label>
                                    <input type="text" class="form-control" formControlName="GrandTotalToPay"
                                       />
                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>Frieght To Pay or Paid</label>
                                    <input type="text" class="form-control" formControlName="FreightTopayorPaid"
                                       />
                                   
                                  </div>

                                  <div class="col-md-3">
                                    <label>
                                      Value Rs.
                                    </label>
                                    <input type="text" class="form-control" formControlName="Valuers"  />

                                   
                                  </div>
                                  <div class="col-md-3">
                                    <label>
                                      Private Mark</label>
                                    <input type="text" class="form-control" formControlName="Privatemark"  />
                                    
                                  </div>
                                  <div class="col-md-3">
                                    <label>Remarks</label>
                                    <input type="text" class="form-control" formControlName="Remarks"  />
                                   
                                  </div>
                                </div>

                                <div class="row justify-content-end text-end">
                                  <div class="col-sm-9">
                                    <div>
                                      <a routerLink="/docgrid" class="btn btn-secondary waves-effect waves-light"
                                        id="btncolors"><i class="bx bx-arrow-back"
                                          aria-hidden="true"></i>&nbsp;Back</a>&nbsp;
                                      <button id="btncolors" class="btn btn-primary waves-effect waves-light"
                                        type="button" (click)="submit()">
                                        <i class="bx bxs-navigation"></i>&nbsp;Submit</button>&nbsp;
                                    
                                    </div>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
