<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">
      <!-- Page Title -->
      <div class="row">
        <div class="col-12">
          <div class="page-title-box d-sm-flex align-items-center justify-content-between">
            <h4 class="mb-sm-0 font-size-18">LR COPY</h4>
            <div class="page-title-right">
              <ol class="breadcrumb m-0">
                <li class="breadcrumb-item">
                  <a routerLink="/Dashboard">Dashboard</a>
                </li>
                <li class="breadcrumb-item active">LR COPY</li>
              </ol>
            </div>
          </div>
        </div>
      </div>

      <!-- Card Body -->
      <div class="card-body">
        <div class="row mb-3">
          <div class="col-10"></div>
          <div class="col-2 text-end">
            <a id="btncolors" class="btn btn-primary waves-effect waves-light" routerLink="/doccreation">
              <i class="fa fa-plus"></i>&nbsp;Create
            </a>
          </div>
        </div>

        <!-- Table -->
        <div class="card-bodys">
          <div class="col-md-12">
                                <div class="d-flex align-items-center justify-content-between flex-wrap">
 
                                    <div id="datatable-buttons" class="d-flex align-items-center gap-2"></div>
 
                                    <div class="d-flex align-items-center gap-3">
                                        <button id="dateRangeBtn" type="button" class="btn btn-primary"
                                            data-bs-toggle="modal" data-bs-target="#dateRangeModal">
                                            Select Date Range
                                        </button>
 
                                        <div class="left-search"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="modal fade" id="dateRangeModal" tabindex="-1" aria-labelledby="dateRangeLabel"
                                aria-hidden="true">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content p-3">
                                        <div class="modal-header">
                                            <h5 class="modal-title" id="dateRangeLabel">Filter data on date range</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                aria-label="Close"></button>
                                        </div>

                                        <div class="modal-body">
                                            <p>Choose a start and an end date which will filter</p>

                                            <div class="mb-3">
                                                <label class="form-label">Start Date</label>
                                                <input type="date" class="form-control w-100" [(ngModel)]="fromDate" />
                                            </div>

                                            <div class="mb-3">
                                                <label class="form-label">End Date</label>
                                                <input type="date" class="form-control w-100" [(ngModel)]="toDate" />
                                            </div>
                                        </div>

                                        <div class="modal-footer" style="border-top: none;">
                                            <button type="button" class="btn btn-primary w-100"
                                                (click)="applyDateFilter()" data-bs-dismiss="modal">
                                                Apply
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
          <table class="table table-striped table-bordered nowrap datatablegrid"
            style="border-collapse: collapse; border-spacing: 0; width: 100%;">
            <thead>
              <tr>
                <th id="colors">Booking No</th>
                <th id="colors">Container No</th>
                <th id="colors">Seal No</th>
                <th id="colors">Download</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let booking of filteredData">
                <td>{{booking.BookingNo}}</td>
                <td>{{booking.Containerno}}</td>
                <td>{{booking.Sealno}}</td>
                <td class="text-center">
                  <button (click)="downloadPdf(booking.LR_id)" class="badge bg-success text-white border-0">
                    <i class="mdi mdi-download font-size-16"></i>
                  </button>

                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
